{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h2>2-Step Verification</h2>
    <p>Enter the verification code generated by your mobile authenticator application.</p>
    {% if error %}
    <div class="alert alert-danger" id="mfa-error">
        {{ error }}
    </div>
    {% endif %}
    <form action="/login/mfa" method="POST">
        <div class="form-group">
            <label for="mfa-input">Verification Code</label>
            <input type="text" id="mfa-input" name="mfa_token" placeholder="123456" required autofocus>
        </div>
        <button type="submit" id="btn-verify" class="btn" style="width: 100%;">Verify</button>
    </form>
</div>
{% endblock %}

name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --no-audit --no-fund

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager "ndk;25.1.8937393" "cmake;3.22.1" >/dev/null 2>&1 || true

      - name: Generate debug keystore
        working-directory: mobile/android/app
        run: |
          keytool -genkeypair -v -storetype PKCS12 -keystore debug.keystore \
            -storepass android -keypass android -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: speack3-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Speack3 APK (latest debug build)
          body: |
            Debug APK built automatically by CI from the latest branch.
            Install on Android (enable "Install unknown apps"). For development use only.
          files: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
